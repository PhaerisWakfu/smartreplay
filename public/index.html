<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高情商嘴替</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: #f8fafc;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .gradient-text {
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Custom scrollbar for textarea */
        textarea::-webkit-scrollbar {
            width: 8px;
        }

        textarea::-webkit-scrollbar-track {
            background: transparent;
        }

        textarea::-webkit-scrollbar-thumb {
            background-color: #475569;
            border-radius: 4px;
        }

        .btn-hover {
            transition: all 0.3s ease;
        }

        .btn-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(56, 189, 248, 0.3);
        }

        input[type="radio"]:checked+label {
            background-color: #38bdf8;
            color: #0f172a;
            border-color: #38bdf8;
        }

        .loader {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top: 3px solid #38bdf8;
            width: 20px;
            height: 20px;
            -webkit-animation: spin 1s linear infinite;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4 sm:p-8">

    <div class="glass-panel w-full max-w-2xl rounded-3xl shadow-2xl p-6 sm:p-10 space-y-8 relative overflow-hidden">
        <!-- Decoration bloobs -->
        <div
            class="absolute -top-24 -left-24 w-48 h-48 bg-sky-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20">
        </div>
        <div
            class="absolute -bottom-24 -right-24 w-48 h-48 bg-indigo-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20">
        </div>

        <div class="text-center relative z-10">
            <h1 class="text-4xl font-bold mb-2 tracking-tight">高情商<span class="gradient-text">嘴替</span></h1>
            <p class="text-slate-400 text-sm">忍一时越想越气，退一步越想越亏</p>
        </div>

        <div class="space-y-6 relative z-10">
            <!-- Input Area -->
            <div class="space-y-3">
                <label class="block text-sm font-medium text-slate-300">输入对方发来的内容：</label>
                <div class="relative group">
                    <textarea id="textContent" rows="4"
                        class="w-full bg-slate-800/50 border border-slate-700 rounded-xl p-4 text-slate-200 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-sky-500 transition duration-200 resize-none"
                        placeholder="将对方的话粘贴在这里，或者在此处上传聊天截图..."></textarea>

                    <div class="mt-3 flex items-center justify-between">
                        <label for="imageUpload"
                            class="cursor-pointer inline-flex items-center gap-2 px-4 py-2 bg-slate-800 border border-slate-700 rounded-lg text-sm text-slate-300 hover:bg-slate-700 hover:text-white transition duration-200">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                            </svg>
                            上传截图识别
                        </label>
                        <input type="file" id="imageUpload" accept="image/*" class="hidden">
                        <span id="fileName" class="text-xs text-sky-400 truncate max-w-[200px]"></span>
                    </div>
                </div>
            </div>

            <!-- Tone Selector -->
            <div class="space-y-3">
                <label class="block text-sm font-medium text-slate-300">选择期望的应对语气：</label>
                <div class="flex flex-wrap gap-3" id="toneSelector">
                    <div>
                        <input type="radio" name="tone" id="tone1" value="高情商安抚" class="hidden" checked>
                        <label for="tone1"
                            class="cursor-pointer px-4 py-2 rounded-full border border-slate-600 bg-slate-800/80 text-slate-300 text-sm font-medium transition duration-200 select-none block hover:bg-slate-700">高情商安抚</label>
                    </div>
                    <div>
                        <input type="radio" name="tone" id="tone2" value="礼貌拒绝" class="hidden">
                        <label for="tone2"
                            class="cursor-pointer px-4 py-2 rounded-full border border-slate-600 bg-slate-800/80 text-slate-300 text-sm font-medium transition duration-200 select-none block hover:bg-slate-700">礼貌拒绝</label>
                    </div>
                    <div>
                        <input type="radio" name="tone" id="tone3" value="据理力争" class="hidden">
                        <label for="tone3"
                            class="cursor-pointer px-4 py-2 rounded-full border border-slate-600 bg-slate-800/80 text-slate-300 text-sm font-medium transition duration-200 select-none block hover:bg-slate-700">据理力争</label>
                    </div>
                    <div>
                        <input type="radio" name="tone" id="tone4" value="阴阳怪气" class="hidden">
                        <label for="tone4"
                            class="cursor-pointer px-4 py-2 rounded-full border border-slate-600 bg-slate-800/80 text-slate-300 text-sm font-medium transition duration-200 select-none block hover:bg-slate-700">阴阳怪气</label>
                    </div>
                    <div>
                        <input type="radio" name="tone" id="tone5" value="甩锅自保" class="hidden">
                        <label for="tone5"
                            class="cursor-pointer px-4 py-2 rounded-full border border-slate-600 bg-slate-800/80 text-slate-300 text-sm font-medium transition duration-200 select-none block hover:bg-slate-700">甩锅自保</label>
                    </div>
                </div>
            </div>

            <!-- Action Area -->
            <div class="pt-4">
                <button id="generateBtn"
                    class="w-full bg-sky-500 hover:bg-sky-400 text-white font-semibold py-3 px-6 rounded-xl btn-hover shadow-lg shadow-sky-500/20 flex justify-center items-center gap-2">
                    <span id="btnText">生成回复</span>
                    <span id="btnLoader" class="loader hidden"></span>
                </button>
            </div>

            <!-- Output Area -->
            <div id="outputArea" class="space-y-3 hidden opacity-0 transition-opacity duration-500 ease-in-out">
                <div class="h-px w-full bg-slate-700/50 my-6"></div>
                <div class="flex justify-between items-center">
                    <label class="block text-sm font-medium flex items-center gap-2 text-sky-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M13 10V3L4 14h7v7l9-11h-7z" />
                        </svg>
                        AI 生成结果
                    </label>
                    <button id="copyBtn"
                        class="text-xs px-3 py-1 bg-slate-700 hover:bg-slate-600 rounded-md text-slate-300 transition duration-200 flex items-center gap-1 focus:outline-none">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                        </svg>
                        一键复制
                    </button>
                </div>
                <div id="replyResult"
                    class="w-full bg-slate-800/80 border border-sky-500/30 rounded-xl p-5 text-slate-100 min-h-[100px] leading-relaxed shadow-inner shadow-black/20">
                    <!-- Result goes here -->
                </div>
            </div>

            <!-- Error Area -->
            <div id="errorArea"
                class="hidden text-red-400 text-sm text-center py-2 bg-red-900/20 rounded-lg border border-red-900/50 mt-4">
                <!-- Error msg -->
            </div>
        </div>
    </div>

    <script>
        const textContent = document.getElementById('textContent');
        const imageUpload = document.getElementById('imageUpload');
        const fileNameDisplay = document.getElementById('fileName');
        const generateBtn = document.getElementById('generateBtn');
        const btnText = document.getElementById('btnText');
        const btnLoader = document.getElementById('btnLoader');
        const outputArea = document.getElementById('outputArea');
        const replyResult = document.getElementById('replyResult');
        const copyBtn = document.getElementById('copyBtn');
        const errorArea = document.getElementById('errorArea');

        let currentImageBase64 = null;
        let isGenerating = false;

        // Image upload handler
        imageUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // Check size (5MB = 5 * 1024 * 1024 bytes)
            if (file.size > 5242880) {
                showError("图片大小不能超过 5MB");
                imageUpload.value = '';
                currentImageBase64 = null;
                fileNameDisplay.textContent = '';
                return;
            }

            hideError();
            fileNameDisplay.textContent = `已选择图片: ${file.name}`;
            textContent.placeholder = "已上传截图，您可以继续输入补充说明或直接点击生成。";

            const reader = new FileReader();
            reader.onload = (event) => {
                currentImageBase64 = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        // Paste image directly into textarea handler
        textContent.addEventListener('paste', (e) => {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let index in items) {
                const item = items[index];
                if (item.kind === 'file') {
                    const blob = item.getAsFile();
                    if (blob && blob.type.startsWith('image/')) {
                        e.preventDefault();
                        const reader = new FileReader();
                        reader.onload = (event) => {
                            currentImageBase64 = event.target.result;
                            fileNameDisplay.textContent = "已粘贴剪贴板图片";
                            textContent.placeholder = "已粘贴截图，您可以继续输入补充说明或直接点击生成。";
                        };
                        reader.readAsDataURL(blob);
                        return;
                    }
                }
            }
        });

        // Generate action
        generateBtn.addEventListener('click', async () => {
            const textValue = textContent.value.trim();
            const toneValue = document.querySelector('input[name="tone"]:checked').value;

            if (!textValue && !currentImageBase64) {
                showError("请先输入文字或上传截图再生成。");
                return;
            }

            if (isGenerating) return;

            // UI Loading state
            setLoadingState(true);
            hideError();
            outputArea.classList.add('hidden', 'opacity-0');

            const payload = {
                inputType: currentImageBase64 ? "image" : "text",
                content: currentImageBase64 || textValue,
                tone: toneValue
            };

            try {
                // Determine API endpoint based on environment
                const baseUrl = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost'
                    ? 'http://127.0.0.1:8787' : 'https://smart-replay.sbuiwqvb110.workers.dev';

                const response = await fetch(`${baseUrl}/api/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (!response.ok || !data.success) {
                    throw new Error(data.error || "请求失败，请稍后重试");
                }

                if (!data.reply) {
                    console.error("Raw AI Data:", data);
                    const debugInfo = data.aiRaw ? JSON.stringify(data.aiRaw) : JSON.stringify(data);
                    throw new Error("AI未能生成有效的回复。\n调试信息: " + debugInfo);
                }

                // Show result
                replyResult.innerHTML = data.reply.replace(/\n/g, '<br>');
                outputArea.classList.remove('hidden');
                // trigger reflow for animation
                void outputArea.offsetWidth;
                outputArea.classList.remove('opacity-0');

            } catch (err) {
                showError(err.message);
            } finally {
                setLoadingState(false);
            }
        });

        // Copy action
        copyBtn.addEventListener('click', () => {
            const rawText = replyResult.innerText || replyResult.textContent;
            navigator.clipboard.writeText(rawText).then(() => {
                const originalText = copyBtn.innerHTML;
                copyBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" /></svg> 已复制`;
                copyBtn.classList.add('text-sky-400');
                setTimeout(() => {
                    copyBtn.innerHTML = originalText;
                    copyBtn.classList.remove('text-sky-400');
                }, 2000);
            }).catch(err => {
                showError("复制失败，请手动选取复制");
            });
        });

        // UI Helpers
        function setLoadingState(isLoading) {
            isGenerating = isLoading;
            btnText.textContent = isLoading ? '思考中...' : '生成回复';
            if (isLoading) {
                btnLoader.classList.remove('hidden');
                generateBtn.classList.add('opacity-80', 'cursor-not-allowed');
            } else {
                btnLoader.classList.add('hidden');
                generateBtn.classList.remove('opacity-80', 'cursor-not-allowed');
            }
        }

        function showError(msg) {
            errorArea.textContent = msg;
            errorArea.classList.remove('hidden');
        }

        function hideError() {
            errorArea.classList.add('hidden');
            errorArea.textContent = '';
        }
    </script>
</body>

</html>
